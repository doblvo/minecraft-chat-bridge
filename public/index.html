<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Minecraft</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617 58%);
      color: #f8fafc;
    }
    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, .92);
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 22px 80px rgba(0, 0, 0, .42);
    }
    h1 { margin: 0 0 6px; font-size: 24px; }
    .muted { color: #94a3b8; font-size: 14px; line-height: 1.35; }
    label { display: block; margin-top: 14px; margin-bottom: 6px; color: #cbd5e1; font-size: 13px; }
    input, button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
    }
    input { background: #0f172a; color: white; border: 1px solid #334155; }
    button { background: #22c55e; color: #04210f; font-weight: 800; cursor: pointer; }
    button:active { transform: translateY(1px); }
    #app { display: none; min-height: 100vh; height: 100vh; flex-direction: column; }
    header {
      padding: 12px 14px;
      background: rgba(15, 23, 42, .94);
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title { font-weight: 800; }
    .status { font-size: 12px; color: #94a3b8; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      background: rgba(30, 41, 59, .92);
      border: 1px solid rgba(148, 163, 184, .18);
      margin-bottom: 9px;
      padding: 10px 11px;
      border-radius: 16px;
      line-height: 1.36;
      word-break: break-word;
    }
    .minecraft { border-left: 4px solid #22c55e; }
    .web { border-left: 4px solid #38bdf8; }
    .player { color: #93c5fd; font-weight: 800; }
    .body { color: #f8fafc; }
    .meta { margin-top: 5px; color: #94a3b8; font-size: 11px; }
    form {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: rgba(15, 23, 42, .94);
      border-top: 1px solid #334155;
    }
    form input { flex: 1; }
    form button { width: auto; padding-left: 16px; padding-right: 16px; }
    .error { color: #fca5a5; margin-top: 10px; min-height: 18px; font-size: 13px; }
  </style>
</head>
<body>
  <section id="login" class="login">
    <div class="card">
      <h1>Chat Minecraft</h1>
      <p class="muted">Panel móvil en tiempo real para ver y responder el chat del servidor.</p>
      <label for="tokenInput">Token del panel</label>
      <input id="tokenInput" placeholder="Ej: 1234" autocomplete="off" />
      <label for="nameInput">Nombre en el panel</label>
      <input id="nameInput" placeholder="Ej: Felipe" autocomplete="off" />
      <br><br>
      <button id="connectBtn">Entrar</button>
      <div id="error" class="error"></div>
      <p class="muted">El token debe coincidir con PANEL_TOKEN en Render.</p>
    </div>
  </section>

  <section id="app">
    <header>
      <div>
        <div class="title">Chat Minecraft</div>
        <div id="serverLabel" class="status">Servidor: main</div>
      </div>
      <div id="connectionStatus" class="status">Conectando...</div>
    </header>

    <main id="chat"></main>

    <form id="form">
      <input id="message" placeholder="Escribe al server..." autocomplete="off" />
      <button>Enviar</button>
    </form>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const SERVER_ID = 'main';
    let socket = null;

    const login = document.getElementById('login');
    const app = document.getElementById('app');
    const tokenInput = document.getElementById('tokenInput');
    const nameInput = document.getElementById('nameInput');
    const connectBtn = document.getElementById('connectBtn');
    const errorBox = document.getElementById('error');
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('message');
    const connectionStatus = document.getElementById('connectionStatus');

    tokenInput.value = localStorage.getItem('mc_panel_token') || '';
    nameInput.value = localStorage.getItem('mc_panel_name') || 'Felipe';

    connectBtn.addEventListener('click', connect);
    tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });

    function connect() {
      const token = tokenInput.value.trim();
      const panelName = nameInput.value.trim() || 'Panel Web';

      if (!token) {
        errorBox.textContent = 'Ingresa el token.';
        return;
      }

      localStorage.setItem('mc_panel_token', token);
      localStorage.setItem('mc_panel_name', panelName);
      errorBox.textContent = '';

      socket = io({ auth: { token } });

      socket.on('connect', () => {
        login.style.display = 'none';
        app.style.display = 'flex';
        connectionStatus.textContent = 'Online';
      });

      socket.on('disconnect', () => {
        connectionStatus.textContent = 'Reconectando...';
      });

      socket.on('connect_error', () => {
        errorBox.textContent = 'Token incorrecto o backend no disponible.';
      });

      socket.on('history', (messages) => {
        chat.innerHTML = '';
        for (const msg of messages) addMessage(msg);
      });

      socket.on('chat', addMessage);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message || !socket?.connected) return;

      socket.emit('web-chat', {
        serverId: SERVER_ID,
        player: localStorage.getItem('mc_panel_name') || 'Panel Web',
        message
      });

      input.value = '';
      input.focus();
    });

    function addMessage(data) {
      const div = document.createElement('div');
      const source = data.source || 'minecraft';
      div.className = `msg ${source}`;

      const date = new Date(data.ts || Date.now());
      const time = date.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

      div.innerHTML = `
        <span class="player">${escapeHtml(data.player)}</span>:
        <span class="body">${escapeHtml(data.message)}</span>
        <div class="meta">${time} · ${escapeHtml(source)} · ${escapeHtml(data.serverId || 'main')}</div>
      `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
