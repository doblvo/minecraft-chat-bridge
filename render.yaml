services:
  - type: web
    name: minecraft-chat-bridge
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_HISTORY
        value: 150
      - key: MAX_OUTBOX
        value: 50
      - key: SERVER_STALE_MS
        value: 20000
